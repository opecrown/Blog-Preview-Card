<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Preview Card</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <div class="card">
            <div class="card-image">
                <img src="illustration-article.svg" alt="Blog Preview" class="card-img">
            </div>
            <div class="card-content">
                <h2><span class="highlight-word">Learning</span></h2>
                <p>Published 21 Dec 2023</p>
                <div class="card-body">
                <h1><strong>HTML & CSS foundations</strong></h1>
                <p>These languages are the backbone of every website, defining the structure and presentation.</p>
            </div>
            <div class="card-footer">
                <div>
                    <img src="image-avatar.webp" alt="Author Avatar" class="avatar">
                    <span><strong>Greg Hooper</strong></span>
                </div>
                </div>
        </div>
    </main>
    
</body>
</html>
